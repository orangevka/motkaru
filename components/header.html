<!-- ============================================================
     Motka Header Component
     Usage: copy <header> block into any page
     ============================================================ -->
<header class="site-header" id="site-header">
  <div class="container site-header__inner">

    <a href="https://motka.ru" class="site-header__logo" aria-label="Motka — на главную">
      <img src="/assets/images/logo.svg" alt="Motka" width="90" height="28">
    </a>

    <nav class="site-header__nav" aria-label="Основная навигация">
      <ul class="site-header__nav-list">
        <li><a href="/pages/uslugi.html" class="site-header__nav-link">Услуги</a></li>
        <li><a href="/pages/cases.html"  class="site-header__nav-link">Кейсы</a></li>
        <li><a href="/pages/blog.html"   class="site-header__nav-link">Блог</a></li>
        <li><a href="/pages/about.html"  class="site-header__nav-link">О нас</a></li>
      </ul>
    </nav>

    <div class="site-header__actions">
      <a href="/pages/contact.html" class="btn btn--primary site-header__cta">Обсудить проект</a>
      <button class="site-header__burger" aria-expanded="false" aria-controls="mobile-menu" aria-label="Открыть меню">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>

  <!-- Mobile menu -->
  <div class="site-header__mobile" id="mobile-menu" hidden>
    <nav aria-label="Мобильная навигация">
      <ul class="site-header__mobile-list">
        <li><a href="/pages/uslugi.html">Услуги</a></li>
        <li><a href="/pages/cases.html">Кейсы</a></li>
        <li><a href="/pages/blog.html">Блог</a></li>
        <li><a href="/pages/about.html">О нас</a></li>
        <li><a href="/pages/contact.html" class="btn btn--primary">Обсудить проект</a></li>
      </ul>
    </nav>
  </div>
</header>

<style>
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-border);
}

.site-header__inner {
  display: flex;
  align-items: center;
  gap: var(--space-8);
  height: 64px;
}

.site-header__logo {
  flex-shrink: 0;
}

.site-header__logo img {
  display: block;
}

.site-header__nav {
  flex: 1;
}

.site-header__nav-list {
  display: flex;
  align-items: center;
  gap: var(--space-6);
}

.site-header__nav-link {
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  color: var(--color-text);
  transition: color var(--transition-fast);
}

.site-header__nav-link:hover,
.site-header__nav-link[aria-current="page"] {
  color: var(--color-accent);
}

.site-header__actions {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}

/* Burger */
.site-header__burger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 32px;
  height: 32px;
  padding: 4px;
}

.site-header__burger span {
  display: block;
  width: 100%;
  height: 2px;
  background: var(--color-text);
  border-radius: 2px;
  transition: transform var(--transition-fast), opacity var(--transition-fast);
}

/* Mobile menu */
.site-header__mobile {
  padding: var(--space-4) var(--gutter) var(--space-6);
  border-top: 1px solid var(--color-border);
}

.site-header__mobile-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}

.site-header__mobile-list a {
  font-size: var(--text-base);
  font-weight: var(--weight-medium);
}

@media (max-width: 768px) {
  .site-header__nav,
  .site-header__cta {
    display: none;
  }

  .site-header__burger {
    display: flex;
  }
}
</style>

<script>
(function() {
  const burger = document.querySelector('.site-header__burger');
  const menu   = document.getElementById('mobile-menu');
  if (!burger || !menu) return;

  burger.addEventListener('click', function() {
    const open = burger.getAttribute('aria-expanded') === 'true';
    burger.setAttribute('aria-expanded', String(!open));
    menu.hidden = open;
  });

  // Highlight active page
  const links = document.querySelectorAll('.site-header__nav-link, .site-header__mobile-list a');
  links.forEach(function(link) {
    if (link.href === location.href) {
      link.setAttribute('aria-current', 'page');
    }
  });
})();
</script>
